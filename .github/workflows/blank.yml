name: APK Derle

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu indir
        uses: actions/checkout@v4
      - name: Java kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}
      - name: APK derle
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: APK kaydet
        uses: actions/upload-artifact@v4
        with:
          name: KarsilamaMRZ
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
